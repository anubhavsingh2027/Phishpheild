<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
  <link rel="stylesheet" href="style1.css" />
  <link rel="stylesheet" href="style2.css">
  
</head>
<body>
  <header class="navbar">
    <img class="logo" src="image/logo.png" alt="logo">
   
    <nav>
      <a class="nav-content" href="index.html">Home</a>
      <a class="nav-content"  href="about.html">About</a>
      <a class="nav-content" href="contact.html">Feedback</a>
      <a id="login-content" href="login.html">Login</a>
    </nav>
  </header>

  <div class="auth-container">
    <div class="auth-box">
      <!-- Register Form -->
      <div class="form register-form">
        <h1>Register</h1>
        <form>
          <div class="input-group">
            <input type="text" id="new-username" placeholder="Username" required>
          </div>
          <div class="input-group">
            <input type="email" id="email" placeholder="Email" required>
          </div>
          <div class="input-group">
            <input type="password" id="new-password" placeholder="Password" required>
          </div>
          <div class="input-group">
            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
          </div>
          <div class="action-buttons">
            <button type="submit" class="register-btn">Register</button>
          </div>
          <p class="already-have-account">Already have an account? <a href="login.html" class="toggle-form">Login</a></p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
